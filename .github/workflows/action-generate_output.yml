---
# Regenerate cvar list outputs and push updates.
name: Generate Output

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"
  push:
    branches: ["main"]
    paths-ignore:
      - "*-cvarlist.txt"
      - "shortnamearray.json"

# Minimal required permissions for pushing content updates
permissions:
  contents: write

concurrency:
  group: generate_output-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  create-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate matrix
        run: chmod +x scripts/generate-matrix.sh && scripts/generate-matrix.sh

      - name: Set Matrix
        id: set-matrix
        run: |
          shortnamearray=$(cat shortnamearray.json)
          echo "${shortnamearray}"
          echo "matrix=${shortnamearray}" >> "$GITHUB_OUTPUT"

  generate-output:
    needs: create-matrix
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.create-matrix.outputs.matrix) }}
      max-parallel: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync with remote main
        if: ${{ !env.ACT }}
        run: |
          git fetch origin main
          git rebase origin/main || (echo "Rebase failed; falling back to merge" && git rebase --abort && git merge --no-edit origin/main)

      - name: Run get_cvars.sh
        id: get_cvars
        env:
          STEAMCMD_USER: ${{ secrets.STEAMCMD_USER }}
          STEAMCMD_PASS: ${{ secrets.STEAMCMD_PASS }}
          MAX_WAIT_SECONDS: "3000"
          CONSOLE_WAIT_SECONDS: "900"
        run: chmod +x scripts/get_cvars.sh && scripts/get_cvars.sh "${{ matrix.shortname }}"

      - name: Record per-server status
        if: ${{ always() }}
        env:
          SHORTNAME: ${{ matrix.shortname }}
          STEP_OUTCOME: ${{ steps.get_cvars.outcome }}
        run: |
          file="${SHORTNAME}-cvarlist.txt"
          status="failed"
          details="get_cvars step failed"

          if [[ "${STEP_OUTCOME}" == "success" ]]; then
            status="no-output"
            details="script succeeded but no cvar markers found"
          fi

          if [[ -s "${file}" ]] && grep -qiE 'cvar list|convars/concommands' "${file}"; then
            status="ok"
            details="cvar markers detected in output file"
          fi

          printf '%s\t%s\t%s\n' "${SHORTNAME}" "${status}" "${details}" > "status-${SHORTNAME}.tsv"

      - name: Upload per-server status artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: cvar-status-${{ matrix.shortname }}
          path: status-${{ matrix.shortname }}.tsv
          retention-days: 7

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Commit & push (rebase to avoid non-fast-forward)
        if: ${{ !env.ACT }}
        env:
          DATE: ${{ steps.date.outputs.date }}
          SHORTNAME: ${{ matrix.shortname }}
        run: |
          set -e
          git add -- *.txt shortnamearray.json || true
          if git diff --cached --quiet; then
            echo "No changes detected for ${SHORTNAME}; skipping push."; exit 0
          fi

          commit_msg="cvarlist(${SHORTNAME}): automated update ${DATE}"
          git commit -m "$commit_msg" || echo "Nothing to commit"
          for attempt in 1 2 3; do
            echo "Attempt $attempt: rebase & push"
            if git fetch origin main && git rebase origin/main; then
              if git push origin HEAD:main; then echo "Push succeeded"; break; fi
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Final attempt failed; trying force-with-lease"
              git push --force-with-lease origin HEAD:main || exit 1
            else
              echo "Retrying after 5s..."; sleep 5
            fi
          done

      - name: Sleep for 10s
        if: ${{ !env.ACT }}
        uses: juliangruber/sleep-action@v2
        with:
          time: 10s

  summarize-results:
    needs: [create-matrix, generate-output]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download status artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cvar-status-*
          path: cvar-status
          merge-multiple: true

      - name: Build summary table
        run: |
          declare -A status_map
          declare -A details_map

          if [[ -d cvar-status ]]; then
            while IFS=$'\t' read -r shortname status details; do
              [[ -n "${shortname}" ]] || continue
              status_map["${shortname}"]="${status}"
              details_map["${shortname}"]="${details}"
            done < <(cat cvar-status/*.tsv 2> /dev/null || true)
          fi

          echo "## Cvarlist Generation Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Shortname | Result | Notes |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"

          while IFS= read -r shortname; do
            [[ -n "${shortname}" ]] || continue
            status="${status_map[${shortname}]:-not-reported}"
            details="${details_map[${shortname}]:-no status artifact from matrix job}"

            case "${status}" in
              ok) label="ok" ;;
              no-output) label="no-output" ;;
              failed) label="failed" ;;
              *) label="not-reported" ;;
            esac

            echo "| ${shortname} | ${label} | ${details} |" >> "$GITHUB_STEP_SUMMARY"
          done < <(jq -r '.[].shortname' shortnamearray.json)
